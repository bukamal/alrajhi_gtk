name: Build Alrajhi Accounting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download ZBar DLLs (for Windows)
      run: |
        curl -L -o zbar.zip https://github.com/NaturalHistoryMuseum/ZBarWin64/releases/download/v0.10/zbar-0.10.zip
        7z x zbar.zip -ozbar_temp -y
        copy zbar_temp\bin\libzbar-64-0.dll .
        copy libzbar-64-0.dll libzbar-64.dll
        copy zbar_temp\bin\libiconv-2.dll .

    - name: Get Qt platforms path
      id: qtpath
      run: |
        $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
        echo "platforms_path=$path" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Build with PyInstaller
      run: |
        pyinstaller --add-binary "libzbar-64.dll;." --add-binary "libiconv-2.dll;." `
          --collect-all pyzbar --collect-all PyQt5 `
          --hidden-import decimal --hidden-import sqlite3 --hidden-import cryptography `
          --add-data "${{ steps.qtpath.outputs.platforms_path }};platforms" `
          --runtime-hook runtime_hook.py `
          --onedir --noconsole --name AlrajhiAccounting main_pyqt5.py

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting-Windows
        path: dist/AlrajhiAccounting/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies (for PyQt5 & OpenCV)
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 libegl1 libgl1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Linux)
      run: |
        pyinstaller --collect-all pyzbar --collect-all PyQt5 `
          --hidden-import decimal --hidden-import sqlite3 --hidden-import cryptography `
          --runtime-hook runtime_hook.py `
          --onedir --noconsole --name AlrajhiAccounting main_pyqt5.py

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting-Linux
        path: dist/AlrajhiAccounting/

  test-imports:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    - name: Test importing core modules
      run: |
        python -c "
        import sys, os
        os.environ['QT_QPA_PLATFORM'] = 'offscreen'
        from PyQt5.QtWidgets import QApplication
        app = QApplication(sys.argv)
        from database import Session, user_dao
        from activation import check_activation
        from utils_pyqt5 import create_auto_backup
        print('✅ All core modules imported successfully')
        "

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: AlrajhiAccounting-Windows
        path: AlrajhiAccounting-Windows
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: AlrajhiAccounting-Linux
        path: AlrajhiAccounting-Linux
    - name: Zip Windows build
      run: zip -r AlrajhiAccounting-Windows.zip AlrajhiAccounting-Windows
    - name: Zip Linux build
      run: zip -r AlrajhiAccounting-Linux.zip AlrajhiAccounting-Linux
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          AlrajhiAccounting-Windows.zip
          AlrajhiAccounting-Linux.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
