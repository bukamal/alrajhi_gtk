name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Copy pyzbar DLLs
      run: |
        python -c "import pyzbar, os, shutil; src = os.path.join(os.path.dirname(pyzbar.__file__), 'libiconv.dll'); dest = '.'; shutil.copy(src, dest) if os.path.exists(src) else None"
        python -c "import pyzbar, os, shutil; src = os.path.join(os.path.dirname(pyzbar.__file__), 'libzbar-64.dll'); dest = '.'; shutil.copy(src, dest) if os.path.exists(src) else None"

    - name: Get Qt platforms path
      id: qtpath
      run: |
        $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
        echo "platforms_path=$path" >> $env:GITHUB_OUTPUT

    - name: Build with PyInstaller (OneDir, windowed)
      run: |
        pyinstaller --add-binary "libiconv.dll;." --add-binary "libzbar-64.dll;." `
          --collect-all pyzbar --collect-all PyQt5 `
          --hidden-import decimal --hidden-import sqlite3 --hidden-import cryptography `
          --add-data "${{ steps.qtpath.outputs.platforms_path }};platforms" `
          --onedir --windowed --name AlrajhiAccounting main_pyqt5.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting
        path: dist/AlrajhiAccounting
