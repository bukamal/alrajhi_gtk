name: Build Windows Installer (Console mode for debugging)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Copy pyzbar DLLs
      run: |
        python -c "import pyzbar, os, shutil; src = os.path.join(os.path.dirname(pyzbar.__file__), 'libiconv.dll'); dest = '.'; shutil.copy(src, dest) if os.path.exists(src) else None"
        python -c "import pyzbar, os, shutil; src = os.path.join(os.path.dirname(pyzbar.__file__), 'libzbar-64.dll'); dest = '.'; shutil.copy(src, dest) if os.path.exists(src) else None"

    - name: Get Qt platforms path
      id: qtpath
      run: |
        $path = python -c "import PyQt5, os; print(os.path.join(os.path.dirname(PyQt5.__file__), 'Qt5', 'plugins', 'platforms'))"
        echo "platforms_path=$path" >> $env:GITHUB_OUTPUT

    - name: Build with PyInstaller (OneDir, CONSOLE enabled)
      run: |
        pyinstaller --add-binary "libiconv.dll;." --add-binary "libzbar-64.dll;." `
          --collect-all pyzbar --collect-all PyQt5 `
          --hidden-import decimal --hidden-import sqlite3 --hidden-import cryptography `
          --add-data "${{ steps.qtpath.outputs.platforms_path }};platforms" `
          --onedir --console --name AlrajhiAccounting_Debug main_pyqt5.py

    - name: Download Inno Setup
      run: |
        curl -L -o is.exe https://jrsoftware.org/download.php/is.exe
        ./is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

    - name: Create Installer Script
      run: |
        $setupScript = @'
        [Setup]
        AppName=Alrajhi Accounting (Debug)
        AppVersion=1.0
        DefaultDirName={pf}\AlrajhiAccountingDebug
        DefaultGroupName=Alrajhi Accounting (Debug)
        UninstallDisplayIcon={app}\AlrajhiAccounting_Debug.exe
        Compression=lzma2
        SolidCompression=yes
        OutputDir=output
        OutputBaseFilename=AlrajhiAccounting_Debug_Setup
        WizardStyle=modern
        ShowLanguageDialog=yes

        [Languages]
        Name: "arabic"; MessagesFile: "compiler:Languages\Arabic.isl"

        [Files]
        Source: "dist\AlrajhiAccounting_Debug\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\Alrajhi Accounting (Debug)"; Filename: "{app}\AlrajhiAccounting_Debug.exe"
        Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
        Name: "{userdesktop}\Alrajhi Accounting (Debug)"; Filename: "{app}\AlrajhiAccounting_Debug.exe"

        [Run]
        Filename: "{app}\AlrajhiAccounting_Debug.exe"; Description: "Run Alrajhi Accounting (Debug Mode)"; Flags: postinstall nowait skipifsilent
        '@
        [System.IO.File]::WriteAllText("setup.iss", $setupScript, [System.Text.Encoding]::Default)

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting_Debug_Installer
        path: output/AlrajhiAccounting_Debug_Setup.exe
