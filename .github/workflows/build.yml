name: Build Windows Executable and Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (onedir)
      run: |
        pyinstaller --onedir --windowed --icon=alrajhi_icon.ico --name "AlrajhiAccounting" `
          --add-data "data;data" `
          --add-data "views_pyqt5;views_pyqt5" `
          --add-data "alrajhi_icon.ico;." `
          --add-data "alrajhi_logo.png;." `
          --hidden-import PyQt5.sip `
          --hidden-import qt_material `
          --hidden-import cryptography `
          --hidden-import openpyxl `
          --hidden-import pyqtgraph `
          --hidden-import qtawesome `
          main_pyqt5.py

    - name: Install Inno Setup
      run: choco install innosetup --version=6.2.2 -y

    - name: Build Installer
      run: iscc setup.iss

    - name: Upload Installer (setup.exe)
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting-Setup
        path: output/AlrajhiAccounting_Setup.exe

    - name: Upload Portable App Folder (optional)
      uses: actions/upload-artifact@v4
      with:
        name: AlrajhiAccounting-Portable
        path: dist/AlrajhiAccounting/
